<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YEAT SB | VTAG</title>
    <style>
        /* Jungle & Monke Theme Styling */
        body {
            background-color: #1a2f1c; /* Deep jungle green */
            color: #f4ebd0; /* Soft banana-cream text */
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #8b5a2b; /* Wooden brown */
            text-shadow: 2px 2px 0px #000;
            font-size: 3rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: Arial, sans-serif;
            font-weight: bold;
            color: #a3c9a8;
            margin-bottom: 40px;
        }

        /* Soundboard Grid Container */
        .soundboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
        }

        /* Monke Button Styling */
        .sound-btn {
            background-color: #4a3525; /* Light bark brown */
            border: 4px solid #8b5a2b; /* Wooden border */
            border-radius: 12px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 25px 15px;
            cursor: pointer;
            box-shadow: 0 8px 0px #271910;
            transition: all 0.1s ease;
            text-shadow: 1px 1px 2px #000;
        }

        /* Click and Active Animation */
        .sound-btn:active {
            box-shadow: 0 2px 0px #271910;
            transform: translateY(6px);
            background-color: #e5a93b; /* Pops bright yellow when pressed */
            border-color: #b87d14;
        }

        .sound-btn:hover {
            background-color: #5c422f;
        }
    </style>
</head>
<body>

    <h1>YEAT-VTAG</h1>
    <div class="subtitle">Official Fan Game Audio Rig</div>

    <!-- The Soundboard Layout -->
    <div class="soundboard-grid">
        <!-- Add your audio triggers here -->
        <button class="sound-btn" onclick="playSound('Money Twerk')">
        <button class="sound-btn" onclick="playSound('On tha line')">
        <button class="sound-btn" onclick="playSound('How it go')">
        <button class="sound-btn" onclick="playSound('Luh geek')">
        <button class="sound-btn" onclick="playSound('System')">
        <button class="sound-btn" onclick="playSound('FATE')">
    </div>
    <audio id="Monëy Twerk [Official Music Vidëo]" src="https://youtube.com"></audio>
    <audio id="On tha line [Official Music Video]" src="https://youtube.com"></audio>
    <audio id="How it go [Official Audio]" src="https://youtube.com"></audio>
    <audio id="Luh gëek (Official Audio)" src="https://youtube.com"></audio>
    <audio id="Systëm [Official Audio]" src="https://youtube.com.com"></audio>
    <audio id="FATË (BONUS) [OFFICIAL AUDIO]"src="https://youtube.com></audio>

    <script>
        // Simple Audio Engine
        function playSound(audioId) {
            const sound = document.getElementById(audioId);
            if (sound) {
                sound.currentTime = 0; // Rewind sound to start so you can spam click it
                sound.play();
            }
        }
    </script>

</body>
</html>
